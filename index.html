<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Lumbini ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <h1 class="title">Happy Birthday ❤️</h1>
    <h2 class="name">Dr. Lumbini 👩‍⚕️✨</h2>

    <p class="date">03 May 2001</p>

    <p class="tagline">Celebrating 7 Beautiful Years Together ❤️</p>

    <button id="openLetter">Open Your Surprise 💌</button>

</div>

<!-- LETTER MODAL -->
<div class="letter" id="letterBox">

    <div class="letter-content">

        <span class="close" id="closeLetter">&times;</span>

        <h2>To Lumbini 💕</h2>

        <p id="typedText"></p>

    </div>

</div>

<!-- FIREWORKS -->
<canvas id="fireworks"></canvas>

<script>

// LETTER TEXT
const message = `My Dearest Lumbini ❤️,

Happy Birthday to the most beautiful soul in my life.

From the past 7 years, you have been my strength, my happiness, and my everything.

Seeing you as a doctor today makes me so proud. You are not just healing patients, you have healed my life too.

Every moment with you is special, and I promise to stand beside you in every phase of life.

I love you more than words can ever express. 💖

Happy Birthday once again, my love.

– Yours forever ❤️`;

let i = 0;
function typeEffect() {
    if (i < message.length) {
        document.getElementById("typedText").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeEffect, 30);
    }
}

// OPEN LETTER
document.getElementById("openLetter").onclick = () => {
    document.getElementById("letterBox").style.display = "flex";
    document.getElementById("typedText").innerHTML = "";
    i = 0;
    typeEffect();
};

// CLOSE LETTER
document.getElementById("closeLetter").onclick = () => {
    document.getElementById("letterBox").style.display = "none";
};


// 🎆 FIREWORKS
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(x, y) {
    for (let i = 0; i < 40; i++) {
        particles.push({
            x: x,
            y: y,
            vx: Math.random() * 4 - 2,
            vy: Math.random() * 4 - 2,
            alpha: 1
        });
    }
}

setInterval(() => {
    createFirework(Math.random() * canvas.width, Math.random() * canvas.height);
}, 800);

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.02;

        ctx.fillStyle = `rgba(255,120,130,${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fill();

        if (p.alpha <= 0) particles.splice(i, 1);
    });

    requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
