<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Arial;
  overflow:hidden;
}

/* INTRO */
#intro {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

/* LOCK */
#lock {
  display:none;
  height:100vh;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* PAGE */
.page {
  display:none;
  height:100vh;
  background:linear-gradient(-45deg,#ff6ec4,#7873f5,#ff9a9e,#fad0c4);
  background-size:400% 400%;
  animation:bg 10s infinite;
  text-align:center;
}

@keyframes bg {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.center {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* HEARTS */
.heart {
  position:fixed;
  bottom:0;
  animation:up 6s linear infinite;
  z-index:1;
}
@keyframes up {
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-100vh);opacity:0;}
}

/* CANVAS FIX */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:0; /* 🔥 IMPORTANT FIX */
  pointer-events:none; /* 🔥 FIX CLICK ISSUE */
}

img {
  width:220px;
  border-radius:15px;
  margin-top:10px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h2 id="introText"></h2>
</div>

<!-- LOCK -->
<div id="lock" class="d-flex">
  <h2>Enter Password ❤️</h2>
  <input id="pass" type="password" placeholder="Enter password">
  <button class="btn btn-light mt-2" onclick="unlock()">Unlock</button>
  <p id="error"></p>
</div>

<!-- PAGE 1 -->
<div id="p1" class="page">
  <canvas id="fire"></canvas>

  <div class="center">
    <h1>Happy Birthday <span id="name"></span> ❤️</h1>
    <p id="type"></p>
    <button class="btn btn-dark" onclick="go(2)">Start 💖</button>
  </div>
</div>

<!-- PAGE 2 -->
<div id="p2" class="page">
  <div class="center">
    <h3>Memories 📸</h3>
    <img id="img" src="img1.jpg">
    <div id="days"></div>
    <button class="btn btn-dark" onclick="go(3)">Next ➡️</button>
  </div>
</div>

<!-- PAGE 3 -->
<div id="p3" class="page">
  <div class="center">
    <h2>For You ❤️</h2>
    <p id="finalMsg"></p>
    <button class="btn btn-warning" onclick="playMusic()">Play Song 🎵</button>
  </div>
</div>

<audio id="music" src="song.mp3"></audio>

<script>

// INTRO
let text="This is for someone special ❤️";
let i=0;
function intro(){
  if(i<text.length){
    document.getElementById("introText").innerHTML+=text[i++];
    setTimeout(intro,50);
  } else {
    setTimeout(()=>{
      document.getElementById("intro").style.display="none";
      document.getElementById("lock").style.display="flex";
    },1000);
  }
}
intro();

// PASSWORD
const PASS="01012023";

function unlock(){
  let val=document.getElementById("pass").value;

  if(val===PASS){
    document.getElementById("lock").style.display="none";
    startApp(); // 🔥 FIXED
  } else {
    document.getElementById("error").innerText="Wrong password 😢";
  }
}

// START APP
function startApp(){
  document.getElementById("p1").style.display="block";

  const herName="Your Love";
  document.getElementById("name").innerText=herName;

  // typing
  let txt="You are my everything ❤️";
  let i=0;
  function type(){
    if(i<txt.length){
      document.getElementById("type").innerHTML+=txt[i++];
      setTimeout(type,40);
    }
  }
  type();

  // slideshow
  let imgs=["img1.jpg","img2.jpg","img3.jpg"];
  let idx=0;
  setInterval(()=>{
    idx=(idx+1)%imgs.length;
    document.getElementById("img").src=imgs[idx];
  },2000);

  // timer
  let start=new Date("2023-01-01");
  setInterval(()=>{
    let d=Math.floor((new Date()-start)/(1000*60*60*24));
    document.getElementById("days").innerHTML=`❤️ ${d} days together`;
  },1000);

  // hearts
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },300);

  // fireworks
  let c=document.getElementById("fire");
  let ctx=c.getContext("2d");
  c.width=window.innerWidth;
  c.height=window.innerHeight;

  let p=[];

  setInterval(()=>{
    let x=Math.random()*c.width;
    let y=Math.random()*c.height/2;

    for(let i=0;i<40;i++){
      p.push({x,y,a:Math.random()*6.28,s:Math.random()*5,l:100});
    }
  },1500);

  function draw(){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,c.width,c.height);

    p.forEach((e,i)=>{
      e.x+=Math.cos(e.a)*e.s;
      e.y+=Math.sin(e.a)*e.s;
      e.l--;

      ctx.fillStyle="white";
      ctx.fillRect(e.x,e.y,2,2);

      if(e.l<=0) p.splice(i,1);
    });

    requestAnimationFrame(draw);
  }
  draw();

  // final message
  document.getElementById("finalMsg").innerHTML=
  `My love ❤️<br><br>
   You are my best decision.<br>
   I will always choose you 💕<br><br>
   Happy Birthday ❤️`;
}

// NAVIGATION
function go(n){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById("p"+n).style.display="block";
}

// MUSIC
function playMusic(){
  document.getElementById("music").play();
}

</script>

</body>
</html>
